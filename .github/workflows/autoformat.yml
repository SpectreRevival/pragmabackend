name: autoformat
on:
  pull_request:
jobs:
  clang-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          FILES=$(
            find . \( \
            -regex '\./\(Persistence\|Packets\|tests\)/Implementation/.*\.cpp' -o \
            -regex '\./\(Persistence\|Packets\|tests\)/Model/.*\.h' \
            \) \
            | grep -vE 'out/|vcpkg_installed/|vcpkg/'
            )
          
          clang-format -i $FILES
          clang-format -i main.cpp StaticHTTPPackets.cpp StaticWSPackets.cpp

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Apply clang-format"
          git push