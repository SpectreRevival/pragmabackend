name: style.yml
on:
  push:
    branches: [master]
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 0
          ref: ${{github.event.pull_request.head.ref}}

      - name: Install clang-tidy
        run: |
          sudo apt update
          sudo apt install -y clang-tidy clang-tools

      - name: Install compiler
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build curl zip unzip tar autoconf autoconf-archive automake libtool linux-libc-dev pkg-config software-properties-common lsb-release
          sudo apt-add-repository "deb https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main"
          sudo apt-key adv --fetch-keys https://apt.kitware.com/keys/kitware-archive-latest.asc
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Cache vcpkg archives directory
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{hashFiles('vcpkg/**')}}-${{hashFiles('vcpkg.json')}}
          restore-keys: |
            vcpkg-${{hashFiles('vcpkg/**')}}

      - name: Configure
        run: |
          /usr/bin/cmake . --preset x64-debug-linux -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Generate protos
        run: cmake --build out/build/x64-debug-linux --target generate_protos

      - name: Run clang tidy
        run: |
          FILES=$(
          find . \( \
          -regex '\./\(Persistence\|Packets\|tests\)/Implementation/.*\.cpp' -o \
          -regex '\./\(Persistence\|Packets\|tests\)/Model/.*\.h' \
          \) \
          | grep -vE 'out/|vcpkg_installed/|vcpkg/'
          )
          
          clang-tidy $FILES main.cpp StaticHTTPPackets.cpp StaticWSPackets.cpp -p out/build/x64-debug-linux