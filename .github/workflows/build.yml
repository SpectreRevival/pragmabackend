name: build.yml
on:
  push:
    branches: [master]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install compiler
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential ninja-build curl zip unzip tar autoconf autoconf-archive automake libtool linux-libc-dev pkg-config software-properties-common lsb-release
          sudo apt-add-repository "deb https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main"
          sudo apt-key adv --fetch-keys https://apt.kitware.com/keys/kitware-archive-latest.asc
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install Visual Studio 2026 Build Tools
        if: runner.os == 'Windows'
        run: |
          curl -L -o vs_buildtools.exe https://aka.ms/vs/2026/release/vs_buildtools.exe
          .\vs_buildtools.exe --quiet --wait --norestart ^
            --add Microsoft.VisualStudio.Workload.VCTools ^
            --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 ^
            --add Microsoft.VisualStudio.Component.VC.CMake.Project

      - name: Install cmake (windows only)
        if: runner.os == 'Windows'
        run: winget install -e --id Kitware.CMake --disable-interactivity --accept-source-agreements --accept-package-agreements

      - name: Create auth.json
        shell: bash
        # secret isn't actually written since I don't have access to create new secrets, but the file just needs to exist so its okay
        run: |
          echo "{\"steamApiKey\": \"${{ secrets.STEAM_API_KEY }}\"}" > auth.json

      - name: Cache vcpkg archives directory
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-${{hashFiles('vcpkg.json')}}-${{hashFiles('vcpkg/**')}}
          restore-keys: |
            vcpkg-

      - name: Configure ${{matrix.build_type}} ${{matrix.os}}
        if: runner.os == 'Linux'
        run: |
          /usr/bin/cmake . --preset x64-${{matrix.build_type}}-linux

      - name: Configure ${{matrix.build_type}} ${{matrix.os}}
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          cmake . --preset x64-${{matrix.build_type}}-win

      - name: Build ${{matrix.build_type}} ${{matrix.os}}
        if: runner.os == 'Linux'
        run: /usr/bin/cmake --build out/build/x64-${{matrix.build_type}}-linux

      - name: Build ${{matrix.build_type}} ${{matrix.os}}
        if: runner.os == 'Windows'
        run: cmake --build out/build/x64-${{matrix.build_type}}-win

      - name: Create artifact
        if: runner.os == 'Linux'
        run: |
          mkdir package
          cp -r out/build/x64-${{matrix.build_type}}-linux/* package

      - name: Upload artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: x64-${{matrix.build_type}}-linux
          path: package/
          retention-days: 1

      - name: Create artifact
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir package
          cp -r out/build/x64-${{matrix.build_type}}-win/* package

      - name: Upload artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: x64-${{matrix.build_type}}-win
          path: package/
          retention-days: 1

  test:
    needs: build
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: x64-${{matrix.build_type}}-linux
          path: build/

      - name: Run tests
        if: runner.os == 'Linux'
        working-directory: build
        run: tests/tests

      - name: Download artifact
        uses: actions/download-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: x64-${{matrix.build_type}}-win
          path: build/

      - name: Run tests
        if: runner.os == 'Windows'
        working-directory: build
        run: tests/tests.exe