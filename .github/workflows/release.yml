name: release.yml
on:
  release:
    types: [published]

jobs:
  attach-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Get workflow ID for build.yml
        id: get_workflow
        run: |
          workflow_id=$(gh workflow list --json name,id \
            --jq '.[] | select(.name=="build.yml") | .id')
          echo "workflow_id=$workflow_id" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{github.token}}


      - name: Get latest successful master run of build.yml
        id: get_run
        run: |
          run_id=$(gh api \
            repos/${{ github.repository }}/actions/workflows/${{ steps.get_workflow.outputs.workflow_id }}/runs \
            --jq '.workflow_runs[] | select(.head_branch=="master" and .conclusion=="success") | .id' \
            | head -n 1)
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{github.token}}

      - name: Get artifact metadata (Linux)
        id: artifact_linux
        run: |
          artifact=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ steps.get_run.outputs.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name=="x64-release-linux")')

          url=$(echo "$artifact" | jq -r '.archive_download_url')
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get artifact metadata (Windows)
        id: artifact_win
        run: |
          artifact=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ steps.get_run.outputs.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name=="x64-release-win")')

          url=$(echo "$artifact" | jq -r '.archive_download_url')
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create artifacts dir
        run: mkdir artifacts

      - name: Download Linux artifact ZIP
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ github.token }}" \
            -o artifacts/x64-release-linux.zip \
            "${{ steps.artifact_linux.outputs.url }}"
      - name: Download Windows artifact ZIP
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ github.token }}" \
            -o artifacts/x64-release-win.zip \
            "${{ steps.artifact_win.outputs.url }}"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}